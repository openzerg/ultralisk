version: v2
plugins:
  - local: /home/admin/.cargo/bin/protoc-gen-buffa
    out: ../src/generated/buffa
    opt: [views=true, json=true]
  - local: /home/admin/.cargo/bin/protoc-gen-buffa-packaging
    out: ../src/generated/buffa
    strategy: all
  - local: /home/admin/.cargo/bin/protoc-gen-connect-rust
    out: ../src/generated/connect
    opt: [buffa_module=crate::proto]
  - local: /home/admin/.cargo/bin/protoc-gen-buffa-packaging
    out: ../src/generated/connect
    strategy: all
    opt: [filter=services]